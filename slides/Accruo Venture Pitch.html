<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
<title>Accruo Venture Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_design-system.css">
</head>
<body>
<div class="document" id="deck">
  <div style="color: rgba(239,234,224,0.5); font-size: 13px; padding: 40px 0;">Loading slides…</div>
</div>

<script>
  const SLIDE_FILES = [
    '01-problem.html',
    '02-why-now-market.html',
    '03-solution-overview.html',
    '04-solution-hr.html',
    '05-solution-individuals.html',
    '06-solution-five-year.html',
    '07-solution-regulatory.html',
    '08-solution-competition.html',
    '09-bizmodel-revenue.html',
    '10-bizmodel-sustainability.html',
    '11-bizmodel-financials.html',
    '12-execution-path.html',
    '13-execution-gtm.html',
    '14-execution-expansion.html',
    '15-team.html',
  ];

  // Scroll preservation — set up before the async slide load so saving on
  // unload (manual Cmd+R, auto-reload, or anything else) works, and restore
  // happens AFTER all slides are appended so the page is tall enough.
  const SCROLL_KEY = '_reload_scroll:' + location.pathname;
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  const saveScroll = () => sessionStorage.setItem(SCROLL_KEY, String(window.scrollY));
  window.addEventListener('beforeunload', saveScroll);
  window.addEventListener('pagehide', saveScroll);
  const _savedY = (() => {
    const v = sessionStorage.getItem(SCROLL_KEY);
    return v === null ? null : parseInt(v, 10);
  })();

  // Load each slide's .sw block and inject into the deck.
  (async () => {
    const deck = document.getElementById('deck');
    deck.innerHTML = '';
    for (const file of SLIDE_FILES) {
      try {
        const html = await fetch(file + '?_=' + Date.now()).then(r => r.text());
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const sw = doc.querySelector('.sw');
        if (sw) deck.appendChild(sw);
        else {
          const err = document.createElement('div');
          err.style.cssText = 'color:rgba(239,234,224,0.5); font-size:12px;';
          err.textContent = `${file}: no .sw block found`;
          deck.appendChild(err);
        }
      } catch (e) {
        const err = document.createElement('div');
        err.style.cssText = 'color:rgba(239,234,224,0.5); font-size:12px;';
        err.textContent = `${file}: ${e.message}`;
        deck.appendChild(err);
      }
    }
    // All slides appended. Now restore scroll if we have one. Two RAFs to give
    // layout a chance to flush.
    if (_savedY !== null) {
      requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, _savedY)));
    }
  })();

  // Auto-reload — polls every slide file AND the shared CSS. CSS changes swap
  // the <link> href (cache-busted) so the new stylesheet is guaranteed to load;
  // slide changes do a full page reload. Scroll position is preserved.
  const WATCH_FILES = [...SLIDE_FILES, '_design-system.css'];
  const reloadKeepingScroll = () => {
    saveScroll();
    location.reload();
  };
  (async () => {
    const baseTimes = {};
    setInterval(async () => {
      try {
        for (const f of WATCH_FILES) {
          const r = await fetch(f + '?_=' + Date.now(), { method: 'HEAD' });
          const t = r.headers.get('Last-Modified');
          if (baseTimes[f] === undefined) { baseTimes[f] = t; continue; }
          if (t && t !== baseTimes[f]) {
            baseTimes[f] = t;
            if (f.endsWith('.css')) {
              for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
                const u = new URL(link.href, location.href);
                if (u.pathname.endsWith('/' + f) || u.pathname.endsWith(f)) {
                  u.searchParams.set('_', Date.now());
                  link.href = u.toString();
                }
              }
            } else {
              reloadKeepingScroll();
            }
            return;
          }
        }
      } catch {}
    }, 1500);
  })();
</script>
</body>
</html>
